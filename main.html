
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHATUWA X MINI | WhatsApp Pair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blood: #8B0000;
      --dark-red: #4A0000;
      --neon-red: #FF0000;
      --black: #000000;
      --glass: rgba(5, 0, 0, 0.85);
      --border: rgba(255, 0, 0, 0.25);
      --text: #E5E5E5;
      --text-dim: #737373;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Scary Horror Background Video */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%) scale(1.1);
      z-index: 0;
      object-fit: cover;
      filter: brightness(0.15) contrast(1.4) saturate(0.6) hue-rotate(-10deg);
    }

    /* Blood Overlay + Vignette */
    .video-overlay {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.95) 100%),
        linear-gradient(180deg, rgba(139,0,0,0.1) 0%, transparent 50%, rgba(139,0,0,0.15) 100%);
      z-index: 1;
      animation: pulseOverlay 4s ease-in-out infinite;
    }

    @keyframes pulseOverlay {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    /* Flickering Light Effect */
    .flicker {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0.03);
      z-index: 2;
      pointer-events: none;
      animation: flicker 0.15s infinite;
      opacity: 0;
    }

    @keyframes flicker {
      0% { opacity: 0; }
      5% { opacity: 1; }
      10% { opacity: 0; }
      15% { opacity: 1; }
      20% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Floating Blood Particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--neon-red);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-red);
      animation: floatUp 8s linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }

    /* Hidden YouTube Audio - Autoplay Force */
    .bg-audio {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Hidden rose container - script එකට ඕන */
    .rose-container { display: none; }

    /* Loading Screen */
    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s;
    }
    #loading.hide {
      opacity: 0;
      visibility: hidden;
    }
    .loader-wrapper {
      position: relative;
      width: 100px; height: 100px;
    }
    .loader-ring {
      position: absolute;
      inset: 0;
      border: 4px solid transparent;
      border-top-color: var(--neon-red);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 30px var(--neon-red);
    }
    .loader-ring:nth-child(2) {
      inset: 12px;
      border-top-color: #600;
      animation-duration: 0.8s;
      animation-direction: reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      margin-top: 32px;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 5px;
      color: var(--neon-red);
      text-transform: uppercase;
      text-shadow: 0 0 20px var(--neon-red);
      font-family: 'Creepster', cursive;
      animation: textGlitch 2s infinite;
    }
    @keyframes textGlitch {
      0%, 100% { text-shadow: 0 0 20px var(--neon-red); }
      50% { text-shadow: 0 0 30px var(--neon-red), 2px 2px 0 #600; }
    }

    /* Main Container - Full Screen */
    .container {
      position: relative;
      z-index: 3;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      width: 100%;
      max-width: 520px;
      background: var(--glass);
      border: 2px solid var(--border);
      border-radius: 30px;
      padding: 50px 45px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow: 
        0 30px 100px rgba(0, 0, 0, 1),
        0 0 80px rgba(255, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      animation: cardBreath 4s ease-in-out infinite;
    }

    @keyframes cardBreath {
      0%, 100% { transform: scale(1); box-shadow: 0 30px 100px rgba(0, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.2); }
      50% { transform: scale(1.02); box-shadow: 0 35px 120px rgba(0, 0, 0, 1), 0 0 100px rgba(255, 0, 0, 0.3); }
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(45deg, var(--neon-red), transparent, var(--neon-red));
      border-radius: 30px;
      z-index: -1;
      animation: borderRotate 4s linear infinite;
      opacity: 0.5;
    }

    @keyframes borderRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .card-icon {
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, var(--blood), var(--black));
      border: 3px solid var(--neon-red);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.8rem;
      color: var(--neon-red);
      box-shadow: 
        0 0 40px rgba(255, 0, 0, 0.6),
        inset 0 0 20px rgba(0, 0, 0, 0.8);
      animation: iconHeartbeat 2s ease-in-out infinite;
    }

    @keyframes iconHeartbeat {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255, 0, 0, 0.6); }
      50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255, 0, 0, 0.9); }
    }

    .card-header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      font-family: 'Creepster', cursive;
      color: var(--neon-red);
      text-shadow: 
        0 0 20px rgba(255, 0, 0, 0.8),
        0 0 40px rgba(255, 0, 0, 0.6),
        2px 2px 0 var(--dark-red);
      letter-spacing: 2px;
    }

    .card-header p {
      font-size: 1rem;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Steps */
    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      height: 3px;
      background: linear-gradient(90deg, var(--blood), var(--neon-red));
      z-index: 0;
      box-shadow: 0 0 10px var(--neon-red);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .step-circle {
      width: 48px;
      height: 48px;
      background: var(--black);
      border: 3px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      transition: all 0.4s;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    .step.active .step-circle {
      background: radial-gradient(circle, var(--neon-red), var(--blood));
      border-color: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
      animation: stepPulse 1.5s ease-in-out infinite;
    }

    @keyframes stepPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
      50% { box-shadow: 0 0 60px rgba(255, 0, 0, 1); }
    }

    .step span {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Input */
    .input-wrapper {
      margin-bottom: 28px;
    }

    .input-label {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--neon-red);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
      display: block;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }

    .input-box {
      display: flex;
      gap: 14px;
    }

    .input-box input {
      flex: 1;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 20px 22px;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      outline: none;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }

    .input-box input:focus {
      border-color: var(--neon-red);
      box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.2), 0 0 40px rgba(255, 0, 0, 0.3);
      background: rgba(0, 0, 0, 0.9);
    }

    .input-box input::placeholder {
      color: #4a4a4a;
      font-weight: 600;
    }

    .input-box button {
      background: linear-gradient(135deg, var(--blood), var(--neon-red));
      border: 2px solid var(--neon-red);
      border-radius: 18px;
      padding: 0 40px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 40px rgba(255, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .input-box button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--neon-red), #FF0040);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .input-box button:hover::before {
      opacity: 1;
    }

    .input-box button span {
      position: relative;
      z-index: 1;
    }

    .input-box button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 50px rgba(255, 0, 0, 0.7);
    }

    .input-box button:active {
      transform: translateY(-2px);
    }

    .input-box button:disabled {
      background: #1a0000;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.3;
    }

    /* Waiting */
    #waiting {
      display: none;
      text-align: center;
      padding: 28px;
      color: var(--neon-red);
      font-weight: 800;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
      font-size: 1.05rem;
    }

    .dots span {
      display: inline-block;
      animation: bounce 1s infinite;
      font-weight: 900;
      font-size: 1.4rem;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-12px); opacity: 1; }
    }

    /* Messages */
    .msg {
      border-radius: 18px;
      padding: 18px 22px;
      margin: 24px 0;
      font-size: 1rem;
      line-height: 1.7;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      backdrop-filter: blur(15px);
      font-weight: 700;
    }

    .msg i { margin-top: 2px; font-size: 1.3rem; }

    .msg.error {
      background: rgba(139, 0, 0, 0.2);
      border: 2px solid rgba(255, 0, 0, 0.5);
      color: #FF6B6B;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    }

    .msg.success {
      background: rgba(0, 100, 0, 0.2);
      border: 2px solid rgba(0, 255, 0, 0.5);
      color: #6BFF6B;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
    }

    .msg.info {
      background: rgba(139, 0, 0, 0.2);
      border: 2px solid rgba(255, 0, 0, 0.5);
      color: #FF8B8B;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    }

    /* Code Box */
    .code-box {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.2), rgba(0, 0, 0, 0.8));
      border: 3px solid transparent;
      background-clip: padding-box;
      border-radius: 22px;
      padding: 32px;
      margin: 28px 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    }

    .code-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      padding: 3px;
      background: linear-gradient(135deg, var(--neon-red), #600, var(--neon-red));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderPulse 2s ease-in-out infinite;
    }

    @keyframes borderPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .code-box:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 60px rgba(255, 0, 0, 0.5);
    }

    .code-label {
      font-size: 0.8rem;
      color: var(--neon-red);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 16px;
      font-weight: 900;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
    }

    .code-value {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 12px;
      color: var(--neon-red);
      font-family: 'Creepster', cursive;
      text-shadow: 
        0 0 20px rgba(255, 0, 0, 1),
        0 0 40px rgba(255, 0, 0, 0.8),
        3px 3px 0 var(--dark-red);
      filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.8));
      animation: textFlicker 3s infinite;
    }

    @keyframes textFlicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
      52% { opacity: 1; }
      54% { opacity: 0.8; }
    }

    .copy-hint {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 16px;
      font-weight: 700;
    }

    .contact {
      text-align: center;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
      transition: all 0.3s;
      padding: 14px 28px;
      border-radius: 50px;
      border: 2px solid var(--border);
    }

    .contact a:hover {
      color: var(--neon-red);
      border-color: var(--neon-red);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
      transform: translateY(-3px);
    }

    @media (max-width: 600px) {
      .main-card {
        padding: 40px 30px;
      }
      .card-header h1 {
        font-size: 1.8rem;
      }
      .input-box {
        flex-direction: column;
      }
      .input-box button {
        padding: 20px;
      }
      .code-value {
        font-size: 2.2rem;
        letter-spacing: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- Scary Background Video -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/video/2024/02/14/200499-912913247_large.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="flicker"></div>

  <!-- Floating Blood Particles -->
  <div class="particles" id="particles"></div>

  <!-- YouTube Audio Autoplay - උඹ දුන්න link එක -->
  <iframe 
    class="bg-audio" 
    src="https://www.youtube.com/embed/KQItsThgpks?autoplay=1&loop=1&playlist=KQItsThgpks&controls=0&mute=0&enablejsapi=1" 
    allow="autoplay; encrypted-media"
    frameborder="0">
  </iframe>

  <!-- Backup Scary Ambient Sound -->
  <audio id="bgMusic" autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2c7e8f4e5d.mp3" type="audio/mpeg">
  </audio>

  <!-- Hidden rose container - පරණ script එකට ඕන නිසා -->
  <div class="rose-container" id="rose-bg"></div>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader-wrapper">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loader-text">Entering Darkness...</div>
  </div>

  <div class="container">
    <div class="main-card">
      <div class="card-header">
        <div class="card-icon">
          <i class="fa-solid fa-skull"></i>
        </div>
        <h1>CHATUWA X MINI</h1>
        <p>Link your soul... I mean WhatsApp</p>
      </div>

      <!-- Steps -->
      <div class="steps">
        <div class="step active">
          <div class="step-circle">1</div>
          <span>Enter</span>
        </div>
        <div class="step">
          <div class="step-circle">2</div>
          <span>Summon</span>
        </div>
        <div class="step">
          <div class="step-circle">3</div>
          <span>Bind</span>
        </div>
      </div>

      <!-- Input -->
      <div class="input-wrapper">
        <label class="input-label">WhatsApp Number</label>
        <div class="input-box">
          <input id="number" type="tel" placeholder="+94 71 234 5678" autocomplete="off" />
          <button id="submit"><span>Summon</span></button>
        </div>
      </div>

      <div id="waiting">
        Summoning code<span class="dots"><span>.</span><span>.</span></span>
      </div>

      <div id="result"></div>

      <div class="contact">
        <a href="https://wa.me/94741336839" target="_blank">
          <i class="fa-solid fa-ghost"></i>
          Need Help? Summon Support
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
  <script>
    // Create Rose Petals Dynamically
    const roseContainer = document.getElementById('rose-bg');
    for (let i = 0; i < 25; i++) {
      const petal = document.createElement('div');
      petal.classList.add('rose-petal');
      petal.style.left = Math.random() * 100 + '%';
      petal.style.width = Math.random() * 12 + 10 + 'px';
      petal.style.height = Math.random() * 12 + 10 + 'px';
      petal.style.animationDelay = Math.random() * 6 + 's';
      petal.style.animationDuration = Math.random() * 8 + 8 + 's';
      roseContainer.appendChild(petal);
    }

    const numEl     = document.getElementById('number');
    const submitBtn = document.getElementById('submit');
    const resultEl  = document.getElementById('result');
    const waitingEl = document.getElementById('waiting');
    const loadingEl = document.getElementById('loading');

    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingEl.style.opacity = '0';
        setTimeout(() => loadingEl.style.display = 'none', 600);
      }, 1200);
    });

    function showMsg(html) { resultEl.innerHTML = html; }

    async function copyCode(code) {
      try {
        await navigator.clipboard.writeText(code);
        document.querySelector('.code-value').textContent = '✓ BOUND!';
        document.querySelector('.copy-hint').textContent = 'Code sealed to clipboard!';
        setTimeout(() => {
          const v = document.querySelector('.code-value');
          if (v) { v.textContent = code; document.querySelector('.copy-hint').textContent = 'Tap to copy'; }
        }, 2500);
      } catch (_) {}
    }

    submitBtn.addEventListener('click', async () => {
      const raw = numEl.value.replace(/[^0-9]/g, '');
      if (!raw) return showMsg('<div class="msg error"><i class="fas fa-skull-crossbones"></i> The void demands your number...</div>');
      if (raw.length < 10) return showMsg('<div class="msg error"><i class="fas fa-skull-crossbones"></i> Number too short. Include country code.</div>');

      numEl.type  = 'text';
      numEl.value = '+' + raw;

      resultEl.innerHTML = '';
      waitingEl.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const { data } = await axios.get(`/code?number=${raw}`);
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        const code = data.code || 'UNAVAILABLE';
        showMsg(`
          <div class="msg success"><i class="fas fa-check-circle"></i> Ritual complete! Code summoned!</div>
          <div class="code-box" onclick="copyCode('${code}')">
            <div class="code-label">Your Summoning Code</div>
            <div class="code-value">${code}</div>
            <div class="copy-hint">Tap to copy</div>
          </div>
          <div class="msg info">
            <strong>Ritual Steps:</strong><br>
            1. Open WhatsApp → Linked Devices<br>
            2. Tap "Link with phone number"<br>
            3. Enter the code above
          </div>
        `);
      } catch (_) {
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        showMsg('<div class="msg error"><i class="fas fa-times-circle"></i> The spirits refuse. Try again.</div>');
      }
    });

    numEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
  </script>

  <!-- Generate Blood Particles -->
  <script>
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
      particlesContainer.appendChild(particle);
    }

    // Random Flicker Effect
    setInterval(() => {
      if (Math.random() > 0.97) {
        document.querySelector('.flicker').style.opacity = '1';
        setTimeout(() => {
          document.querySelector('.flicker').style.opacity = '0';
        }, 50);
      }
    }, 100);

    // Force Audio Play on First Click
    document.addEventListener('click', () => {
      const audio = document.getElementById('bgMusic');
      if (audio && audio.paused) {
        audio.play().catch(() => {});
      }
    }, { once: true });
  </script>
</body>
</html>

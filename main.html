<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHATUWA X MINI | WhatsApp Pair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --neon-red: #FF0040;
      --neon-cyan: #00F5FF;
      --glass: rgba(10, 10, 15, 0.75);
      --border: rgba(255, 0, 64, 0.2);
      --text: #F8FAFC;
      --text-dim: #94A3B8;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Scary Background Video */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%) scale(1.1);
      z-index: 0;
      object-fit: cover;
      filter: brightness(0.25) contrast(1.3) saturate(0.7);
    }

    /* Dark Overlay */
    .video-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
      z-index: 1;
    }

    /* YouTube Audio - Hidden */
    .bg-audio {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Hidden rose container - script එකට ඕන නිසා */
    .rose-container { display: none; }

    /* Loading Screen */
    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #loading.hide {
      opacity: 0;
      visibility: hidden;
    }
    .loader-wrapper {
      position: relative;
      width: 90px; height: 90px;
    }
    .loader-ring {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-top-color: var(--neon-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px var(--neon-red);
    }
    .loader-ring:nth-child(2) {
      inset: 10px;
      border-top-color: var(--neon-cyan);
      animation-duration: 0.7s;
      animation-direction: reverse;
      box-shadow: 0 0 20px var(--neon-cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      margin-top: 28px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--neon-red);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--neon-red);
    }

    /* Main Container - Full Screen */
    .container {
      position: relative;
      z-index: 3;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      width: 100%;
      max-width: 520px;
      background: var(--glass);
      border: 2px solid var(--border);
      border-radius: 28px;
      padding: 50px 45px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 
        0 25px 80px rgba(0, 0, 0, 1),
        0 0 60px rgba(255, 0, 64, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-red), var(--neon-cyan), transparent);
      animation: borderGlow 3s linear infinite;
    }

    @keyframes borderGlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .card-icon {
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, var(--neon-red), #4A0000);
      border: 3px solid var(--neon-red);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.8rem;
      color: #fff;
      box-shadow: 0 15px 40px rgba(255, 0, 64, 0.4);
    }

    .card-header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, var(--neon-red) 50%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .card-header p {
      font-size: 1rem;
      color: var(--text-dim);
      font-weight: 600;
    }

    /* Steps */
    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-red), var(--neon-cyan));
      z-index: 0;
      box-shadow: 0 0 10px var(--neon-red);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .step-circle {
      width: 48px;
      height: 48px;
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    .step.active .step-circle {
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 40px rgba(255, 0, 64, 0.8);
    }

    .step span {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Input */
    .input-wrapper {
      margin-bottom: 28px;
    }

    .input-label {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
      display: block;
      text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
    }

    .input-box {
      display: flex;
      gap: 14px;
    }

    .input-box input {
      flex: 1;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 20px 22px;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      outline: none;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }

    .input-box input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.15), 0 0 40px rgba(0, 245, 255, 0.3);
      background: rgba(0, 0, 0, 0.9);
    }

    .input-box input::placeholder {
      color: #475569;
      font-weight: 600;
    }

    .input-box button {
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      border: 2px solid var(--neon-red);
      border-radius: 18px;
      padding: 0 40px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 40px rgba(255, 0, 64, 0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .input-box button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(255, 0, 64, 0.7);
    }

    .input-box button:active {
      transform: translateY(-1px);
    }

    .input-box button:disabled {
      background: #1a0000;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.3;
    }

    /* Waiting */
    #waiting {
      display: none;
      text-align: center;
      padding: 28px;
      color: var(--neon-cyan);
      font-weight: 800;
      text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
      font-size: 1.05rem;
    }

    .dots span {
      display: inline-block;
      animation: bounce 1.2s infinite;
      font-weight: 900;
      font-size: 1.4rem;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-12px); opacity: 1; }
    }

    /* Messages */
    .msg {
      border-radius: 18px;
      padding: 18px 22px;
      margin: 24px 0;
      font-size: 1rem;
      line-height: 1.7;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      backdrop-filter: blur(15px);
      font-weight: 700;
    }

    .msg i { margin-top: 2px; font-size: 1.3rem; }

    .msg.error {
      background: rgba(139, 0, 0, 0.2);
      border: 2px solid rgba(255, 0, 0, 0.5);
      color: #FF6B6B;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    }

    .msg.success {
      background: rgba(0, 100, 0, 0.2);
      border: 2px solid rgba(0, 255, 0, 0.5);
      color: #6BFF6B;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
    }

    .msg.info {
      background: rgba(139, 0, 0, 0.2);
      border: 2px solid rgba(255, 0, 64, 0.5);
      color: #FF8B8B;
      box-shadow: 0 0 30px rgba(255, 0, 64, 0.3);
    }

    /* Code Box */
    .code-box {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.2), rgba(0, 0, 0, 0.9));
      border: 3px solid var(--neon-red);
      border-radius: 22px;
      padding: 32px;
      margin: 28px 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s;
      position: relative;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
    }

    .code-box:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 70px rgba(255, 0, 0, 0.5);
    }

    .code-label {
      font-size: 0.8rem;
      color: var(--neon-red);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 16px;
      font-weight: 900;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.9);
    }

    .code-value {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 12px;
      color: var(--neon-red);
      font-family: 'Courier New', monospace;
      text-shadow: 
        0 0 20px rgba(255, 0, 0, 1),
        0 0 40px rgba(255, 0, 0, 0.8),
        3px 3px 0 #4A0000;
      animation: textGlow 2s ease-in-out infinite;
    }

    @keyframes textGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 0, 0, 1)); }
    }

    .copy-hint {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 16px;
      font-weight: 700;
    }

    .contact {
      text-align: center;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
      transition: all 0.3s;
      padding: 14px 28px;
      border-radius: 50px;
      border: 2px solid var(--border);
    }

    .contact a:hover {
      color: var(--neon-red);
      border-color: var(--neon-red);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
      transform: translateY(-3px);
    }

    @media (max-width: 600px) {
      .main-card {
        padding: 40px 30px;
      }
      .card-header h1 {
        font-size: 1.8rem;
      }
      .input-box {
        flex-direction: column;
      }
      .input-box button {
        padding: 20px;
      }
      .code-value {
        font-size: 2.2rem;
        letter-spacing: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- Scary Background Video -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/video/2024/02/14/200499-912913247_large.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- YouTube Audio Autoplay - උඹ දුන්න link එක -->
  <iframe 
    class="bg-audio" 
    src="https://www.youtube.com/embed/KQItsThgpks?autoplay=1&loop=1&playlist=KQItsThgpks&controls=0&mute=0&enablejsapi=1" 
    allow="autoplay; encrypted-media"
    frameborder="0">
  </iframe>

  <!-- Hidden rose container - පරණ script එකට ඕන නිසා -->
  <div class="rose-container" id="rose-bg"></div>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader-wrapper">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loader-text">Summoning...</div>
  </div>

  <div class="container">
    <div class="main-card">
      <div class="card-header">
        <div class="card-icon">
          <i class="fa-solid fa-skull"></i>
        </div>
        <h1>CHATUWA X MINI</h1>
        <p>Bind your WhatsApp to the darkness</p>
      </div>

      <!-- Steps -->
      <div class="steps">
        <div class="step active">
          <div class="step-circle">1</div>
          <span>Enter</span>
        </div>
        <div class="step">
          <div class="step-circle">2</div>
          <span>Summon</span>
        </div>
        <div class="step">
          <div class="step-circle">3</div>
          <span>Bind</span>
        </div>
      </div>

      <!-- Input -->
      <div class="input-wrapper">
        <label class="input-label">WhatsApp Number</label>
        <div class="input-box">
          <input id="number" type="tel" placeholder="+94 71 234 5678" autocomplete="off" />
          <button id="submit"><span>Summon</span></button>
        </div>
      </div>

      <div id="waiting">
        Summoning code<span class="dots"><span>.</span><span>.</span></span>
      </div>

      <div id="result"></div>

      <div class="contact">
        <a href="https://wa.me/94741336839" target="_blank">
          <i class="fa-solid fa-ghost"></i>
          Need Help? Summon Support
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
  <script>
    // Create Rose Petals Dynamically
    const roseContainer = document.getElementById('rose-bg');
    for (let i = 0; i < 25; i++) {
      const petal = document.createElement('div');
      petal.classList.add('rose-petal');
      petal.style.left = Math.random() * 100 + '%';
      petal.style.width = Math.random() * 12 + 10 + 'px';
      petal.style.height = Math.random() * 12 + 10 + 'px';
      petal.style.animationDelay = Math.random() * 6 + 's';
      petal.style.animationDuration = Math.random() * 8 + 8 + 's';
      roseContainer.appendChild(petal);
    }

    const numEl     = document.getElementById('number');
    const submitBtn = document.getElementById('submit');
    const resultEl  = document.getElementById('result');
    const waitingEl = document.getElementById('waiting');
    const loadingEl = document.getElementById('loading');

    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingEl.style.opacity = '0';
        setTimeout(() => loadingEl.style.display = 'none', 600);
      }, 1200);
    });

    function showMsg(html) { resultEl.innerHTML = html; }

    async function copyCode(code) {
      try {
        await navigator.clipboard.writeText(code);
        document.querySelector('.code-value').textContent = '✓ BOUND!';
        document.querySelector('.copy-hint').textContent = 'Code sealed to clipboard!';
        setTimeout(() => {
          const v = document.querySelector('.code-value');
          if (v) { v.textContent = code; document.querySelector('.copy-hint').textContent = 'Tap to copy'; }
        }, 2500);
      } catch (_) {}
    }

    submitBtn.addEventListener('click', async () => {
      const raw = numEl.value.replace(/[^0-9]/g, '');
      if (!raw) return showMsg('<div class="msg error"><i class="fas fa-skull-crossbones"></i> The void demands your number...</div>');
      if (raw.length < 10) return showMsg('<div class="msg error"><i class="fas fa-skull-crossbones"></i> Number too short. Include country code.</div>');

      numEl.type  = 'text';
      numEl.value = '+' + raw;

      resultEl.innerHTML = '';
      waitingEl.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const { data } = await axios.get(`/code?number=${raw}`);
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        const code = data.code || 'UNAVAILABLE';
        showMsg(`
          <div class="msg success"><i class="fas fa-check-circle"></i> Ritual complete! Code summoned!</div>
          <div class="code-box" onclick="copyCode('${code}')">
            <div class="code-label">Your Summoning Code</div>
            <div class="code-value">${code}</div>
            <div class="copy-hint">Tap to copy</div>
          </div>
          <div class="msg info">
            <strong>Ritual Steps:</strong><br>
            1. Open WhatsApp → Linked Devices<br>
            2. Tap "Link with phone number"<br>
            3. Enter the code above
          </div>
        `);
      } catch (_) {
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        showMsg('<div class="msg error"><i class="fas fa-times-circle"></i> The spirits refuse. Try again.</div>');
      }
    });

    numEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHATUWA X MINI | WhatsApp Pair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --neon-red: #FF0040;
      --neon-cyan: #00F5FF;
      --glass: rgba(10, 10, 15, 0.75);
      --border: rgba(255, 0, 64, 0.2);
      --text: #F8FAFC;
      --text-dim: #94A3B8;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Scary Background Video */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: 0;
      object-fit: cover;
      filter: brightness(0.25) contrast(1.3) saturate(0.7);
    }

    /* Dark Overlay */
    .video-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
      z-index: 1;
    }

    /* YouTube Audio - උඹ දුන්න link එක */
    .bg-audio {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Hidden rose container - script එකට ඕන */
    .rose-container { display: none; }

    /* Loading Screen */
    #loading {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #loading.hide {
      opacity: 0;
      visibility: hidden;
    }
    .loader-wrapper {
      position: relative;
      width: 90px; height: 90px;
    }
    .loader-ring {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-top-color: var(--neon-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px var(--neon-red);
    }
    .loader-ring:nth-child(2) {
      inset: 10px;
      border-top-color: var(--neon-cyan);
      animation-duration: 0.7s;
      animation-direction: reverse;
      box-shadow: 0 0 20px var(--neon-cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      margin-top: 28px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--neon-red);
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--neon-red);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Main Container - Full Screen */
    .container {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      width: 100%;
      max-width: 500px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 
        0 25px 80px rgba(0, 0, 0, 0.9),
        0 0 60px rgba(255, 0, 64, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      animation: cardFloat 3s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-red), var(--neon-cyan), transparent);
      animation: borderGlow 3s linear infinite;
    }

    @keyframes borderGlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2.5rem;
      color: #fff;
      box-shadow: 0 15px 40px rgba(255, 0, 64, 0.4);
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 15px 40px rgba(255, 0, 64, 0.4); }
      50% { box-shadow: 0 15px 60px rgba(0, 245, 255, 0.6); }
    }

    .card-header h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, var(--neon-red) 50%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .card-header p {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* Steps */
    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 36px;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 22px;
      left: 22px;
      right: 22px;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-red), var(--neon-cyan));
      z-index: 0;
      opacity: 0.3;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .step-circle {
      width: 44px;
      height: 44px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .step.active .step-circle {
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 30px rgba(255, 0, 64, 0.6);
      animation: stepGlow 1.5s ease-in-out infinite;
    }

    @keyframes stepGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(255, 0, 64, 0.6); }
      50% { box-shadow: 0 0 40px rgba(0, 245, 255, 0.8); }
    }

    .step span {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Input */
    .input-wrapper {
      margin-bottom: 24px;
    }

    .input-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: block;
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
    }

    .input-box {
      display: flex;
      gap: 12px;
    }

    .input-box input {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 700;
      outline: none;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }

    .input-box input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.15), 0 0 30px rgba(0, 245, 255, 0.2);
      background: rgba(0, 0, 0, 0.7);
    }

    .input-box input::placeholder {
      color: #475569;
      font-weight: 600;
    }

    .input-box button {
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      border: none;
      border-radius: 16px;
      padding: 0 36px;
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(255, 0, 64, 0.4);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-box button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-red));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .input-box button:hover::before {
      opacity: 1;
    }

    .input-box button span {
      position: relative;
      z-index: 1;
    }

    .input-box button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(255, 0, 64, 0.6);
    }

    .input-box button:active {
      transform: translateY(-1px);
    }

    .input-box button:disabled {
      background: #1a1a1a;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.4;
    }

    /* Waiting */
    #waiting {
      display: none;
      text-align: center;
      padding: 24px;
      color: var(--neon-cyan);
      font-weight: 700;
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
    }

    .dots span {
      display: inline-block;
      animation: bounce 1.2s infinite;
      font-weight: 900;
      font-size: 1.3rem;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-10px); opacity: 1; }
    }

    /* Messages */
    .msg {
      border-radius: 16px;
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 0.95rem;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      backdrop-filter: blur(10px);
      font-weight: 600;
    }

    .msg i { margin-top: 2px; font-size: 1.2rem; }

    .msg.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #FCA5A5;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
    }

    .msg.success {
      background: rgba(0, 245, 255, 0.15);
      border: 1px solid rgba(0, 245, 255, 0.4);
      color: #67E8F9;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
    }

    .msg.info {
      background: rgba(255, 0, 64, 0.15);
      border: 1px solid rgba(255, 0, 64, 0.4);
      color: #FDA4AF;
      box-shadow: 0 0 20px rgba(255, 0, 64, 0.2);
    }

    /* Code Box */
    .code-box {
      background: linear-gradient(135deg, rgba(255, 0, 64, 0.1), rgba(0, 245, 255, 0.1));
      border: 2px solid transparent;
      background-clip: padding-box;
      border-radius: 20px;
      padding: 28px;
      margin: 24px 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .code-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 2px;
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderRotate 3s linear infinite;
    }

    @keyframes borderRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .code-box:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 50px rgba(255, 0, 64, 0.3);
    }

    .code-label {
      font-size: 0.75rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 14px;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
    }

    .code-value {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 40px rgba(255, 0, 64, 0.6);
      filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.4));
    }

    .copy-hint {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 14px;
      font-weight: 700;
    }

    .contact {
      text-align: center;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      transition: all 0.3s;
      padding: 12px 24px;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    .contact a:hover {
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .main-card {
        padding: 36px 28px;
      }
      .card-header h1 {
        font-size: 1.75rem;
      }
      .input-box {
        flex-direction: column;
      }
      .input-box button {
        padding: 18px;
      }
      .code-value {
        font-size: 2rem;
        letter-spacing: 6px;
      }
    }
  </style>
</head>
<body>

  <!-- Scary Background Video -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/video/2023/10/08/184053-872226052_large.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- YouTube Audio Autoplay - උඹ දුන්න link එක https://youtube.com/shorts/KQItsThgpks -->
  <iframe 
    class="bg-audio" 
    src="https://www.youtube.com/embed/KQItsThgpks?autoplay=1&loop=1&playlist=KQItsThgpks&controls=0&mute=0&enablejsapi=1&playsinline=1" 
    allow="autoplay; encrypted-media; accelerometer; gyroscope; picture-in-picture"
    frameborder="0">
  </iframe>

  <!-- Hidden rose container - පරණ script එකට ඕන නිසා -->
  <div class="rose-container" id="rose-bg"></div>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader-wrapper">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loader-text">Initializing System</div>
  </div>

  <div class="container">
    <div class="main-card">
      <div class="card-header">
        <div class="card-icon">
          <i class="fa-brands fa-whatsapp"></i>
        </div>
        <h1>CHATUWA X MINI</h1>
        <p>Link your WhatsApp number to activate bot</p>
      </div>

      <!-- Steps -->
      <div class="steps">
        <div class="step active">
          <div class="step-circle">1</div>
          <span>Enter</span>
        </div>
        <div class="step">
          <div class="step-circle">2</div>
          <span>Generate</span>
        </div>
        <div class="step">
          <div class="step-circle">3</div>
          <span>Link</span>
        </div>
      </div>

      <!-- Input -->
      <div class="input-wrapper">
        <label class="input-label">WhatsApp Number</label>
        <div class="input-box">
          <input id="number" type="tel" placeholder="+94 71 234 5678" autocomplete="off" />
          <button id="submit"><span>Generate</span></button>
        </div>
      </div>

      <div id="waiting">
        Generating code<span class="dots"><span>.</span><span>.</span></span>
      </div>

      <div id="result"></div>

      <div class="contact">
        <a href="https://wa.me/94741336839" target="_blank">
          <i class="fa-brands fa-whatsapp"></i>
          Need Help? Contact Support
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
  <script>
    // Create Rose Petals Dynamically
    const roseContainer = document.getElementById('rose-bg');
    for (let i = 0; i < 25; i++) {
      const petal = document.createElement('div');
      petal.classList.add('rose-petal');
      petal.style.left = Math.random() * 100 + '%';
      petal.style.width = Math.random() * 12 + 10 + 'px';
      petal.style.height = Math.random() * 12 + 10 + 'px';
      petal.style.animationDelay = Math.random() * 6 + 's';
      petal.style.animationDuration = Math.random() * 8 + 8 + 's';
      roseContainer.appendChild(petal);
    }

    const numEl     = document.getElementById('number');
    const submitBtn = document.getElementById('submit');
    const resultEl  = document.getElementById('result');
    const waitingEl = document.getElementById('waiting');
    const loadingEl = document.getElementById('loading');

    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingEl.style.opacity = '0';
        setTimeout(() => loadingEl.style.display = 'none', 600);
      }, 1200);
    });

    function showMsg(html) { resultEl.innerHTML = html; }

    async function copyCode(code) {
      try {
        await navigator.clipboard.writeText(code);
        document.querySelector('.code-value').textContent = '✓ COPIED!';
        document.querySelector('.copy-hint').textContent = 'Code copied to clipboard!';
        setTimeout(() => {
          const v = document.querySelector('.code-value');
          if (v) { v.textContent = code; document.querySelector('.copy-hint').textContent = 'Tap to copy'; }
        }, 2500);
      } catch (_) {}
    }

    submitBtn.addEventListener('click', async () => {
      const raw = numEl.value.replace(/[^0-9]/g, '');
      if (!raw) return showMsg('<div class="msg error"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number.</div>');
      if (raw.length < 10) return showMsg('<div class="msg error"><i class="fas fa-exclamation-circle"></i> Number too short. Include country code (e.g. 9475xxxxxxx).</div>');

      numEl.type  = 'text';
      numEl.value = '+' + raw;

      resultEl.innerHTML = '';
      waitingEl.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const { data } = await axios.get(`/code?number=${raw}`);
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        const code = data.code || 'UNAVAILABLE';
        showMsg(`
          <div class="msg success"><i class="fas fa-check-circle"></i> Pairing code generated successfully!</div>
          <div class="code-box" onclick="copyCode('${code}')">
            <div class="code-label">Your Pairing Code</div>
            <div class="code-value">${code}</div>
            <div class="copy-hint">Tap to copy</div>
          </div>
          <div class="msg info">
            <strong>How to link:</strong><br>
            1. Open WhatsApp → Linked Devices<br>
            2. Tap "Link with phone number"<br>
            3. Enter the code above
          </div>
        `);
      } catch (_) {
        waitingEl.style.display = 'none';
        submitBtn.disabled = false;
        showMsg('<div class="msg error"><i class="fas fa-times-circle"></i> Connection failed. Please try again.</div>');
      }
    });

    numEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
  </script>
</body>
</html>
